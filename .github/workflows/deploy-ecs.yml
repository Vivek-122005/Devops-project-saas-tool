name: Deploy ShopSmart to ECS

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
      TF_STATE_DYNAMODB_TABLE: ${{ secrets.TF_STATE_DYNAMODB_TABLE }}
      TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate deploy secrets
        run: |
          missing=0
          for key in AWS_REGION TF_STATE_BUCKET TF_STATE_DYNAMODB_TABLE; do
            value="${!key:-}"
            if [ -z "${value}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Terraform init
        working-directory: infrastructure/ecs
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY:-shopsmart/ecs.tfstate}" \
            -backend-config="region=${TF_STATE_REGION:-${AWS_REGION}}" \
            -backend-config="dynamodb_table=${TF_STATE_DYNAMODB_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform apply infrastructure
        working-directory: infrastructure/ecs
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="container_image=public.ecr.aws/docker/library/node:20-alpine" \
            -var="desired_count=0"

      - name: Read Terraform outputs
        id: tf
        working-directory: infrastructure/ecs
        run: |
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "alb_url=$(terraform output -raw alb_url)" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "service_name=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"
          echo "task_family=$(terraform output -raw task_definition_family)" >> "$GITHUB_OUTPUT"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        env:
          ECR_REPOSITORY_URL: ${{ steps.tf.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            -t "${ECR_REPOSITORY_URL}:${IMAGE_TAG}" \
            -t "${ECR_REPOSITORY_URL}:latest" \
            .
          docker push "${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          docker push "${ECR_REPOSITORY_URL}:latest"

      - name: Terraform apply image release
        working-directory: infrastructure/ecs
        env:
          ECR_REPOSITORY_URL: ${{ steps.tf.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="container_image=${ECR_REPOSITORY_URL}:${IMAGE_TAG}" \
            -var="desired_count=1"

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ steps.tf.outputs.cluster_name }}" \
            --services "${{ steps.tf.outputs.service_name }}"

      - name: Smoke test deployed app
        run: |
          curl -fsS "${{ steps.tf.outputs.alb_url }}/api/health"