name: CD - Production Deployment

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true
        type: string

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and push Docker images
  build-and-push:
    name: Build & Push Production Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=production-latest
            type=sha,prefix=prod-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  # Create GitHub release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  # Deploy to production (requires manual approval)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://app.yourapp.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
        continue-on-error: true

      - name: Backup database
        run: |
          echo "Creating database backup..."
          # Add your database backup script here
        continue-on-error: true

      - name: Deploy to Kubernetes (Blue-Green)
        run: |
          echo "Deploying to Kubernetes production cluster..."
          # kubectl apply -f infrastructure/kubernetes/production/
          # kubectl rollout status deployment/backend-deployment -n production
          # kubectl rollout status deployment/frontend-deployment -n production
        continue-on-error: true

      - name: Run database migrations
        run: |
          echo "Running database migrations..."
          # kubectl exec -n production deployment/backend-deployment -- npm run migrate
        continue-on-error: true

      - name: Update DNS/Load Balancer
        run: |
          echo "Updating traffic routing..."
          # Switch traffic from blue to green deployment
        continue-on-error: true

  # Health checks and monitoring
  health-checks:
    name: Production Health Checks
    runs-on: ubuntu-latest
    needs: deploy-production

    steps:
      - name: Wait for deployment stabilization
        run: sleep 60

      - name: Health check - Backend API
        run: |
          curl -f https://api.yourapp.com/health || echo "Backend health check skipped"
        continue-on-error: true

      - name: Health check - Frontend
        run: |
          curl -f https://app.yourapp.com/health || echo "Frontend health check skipped"
        continue-on-error: true

      - name: Check response time
        run: |
          echo "Checking API response time..."
          # Add response time check script
        continue-on-error: true

      - name: Verify database connectivity
        run: |
          echo "Verifying database connectivity..."
          # Add database connectivity check
        continue-on-error: true

  # Rollback capability
  rollback-check:
    name: Monitor for Rollback
    runs-on: ubuntu-latest
    needs: health-checks
    if: failure()

    steps:
      - name: Rollback deployment
        run: |
          echo "⚠️ Health checks failed - initiating rollback..."
          # kubectl rollout undo deployment/backend-deployment -n production
          # kubectl rollout undo deployment/frontend-deployment -n production
        continue-on-error: true

      - name: Notify team of rollback
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "🚨 Production deployment rolled back!",
              attachments: [{
                color: 'danger',
                text: `Deployment failed health checks and was rolled back.\nCommit: ${process.env.GITHUB_SHA}\nAuthor: ${process.env.GITHUB_ACTOR}`
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # Notifications
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-production, health-checks]
    if: always()

    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Production Deployment: ${{ job.status }}
            Version: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            URL: https://app.yourapp.com
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
        continue-on-error: true

      - name: Send email notification
        run: |
          echo "Sending deployment notification email..."
          # Add email notification script
        continue-on-error: true

      - name: Update status page
        run: |
          echo "Updating status page..."
          # Update status page with deployment info
        continue-on-error: true
