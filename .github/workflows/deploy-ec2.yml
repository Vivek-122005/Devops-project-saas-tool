name: Deploy ShopSmart To EC2 (PM2 Only)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate required deploy secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          BACKEND_ADMIN_KEY: ${{ secrets.BACKEND_ADMIN_KEY }}
          BACKEND_FRONTEND_URL: ${{ secrets.BACKEND_FRONTEND_URL }}
        run: |
          missing=0
          for key in EC2_HOST EC2_USER EC2_SSH_KEY BACKEND_ADMIN_KEY BACKEND_FRONTEND_URL; do
            value="${!key:-}"
            if [ -z "${value}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy over SSH with PM2 (Backend + Frontend)
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          DEPLOY_REF: ${{ github.ref_name }}
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
          APP_NAME: ${{ secrets.EC2_APP_NAME }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          BACKEND_FRONTEND_URL: ${{ secrets.BACKEND_FRONTEND_URL }}
          BACKEND_ADMIN_KEY: ${{ secrets.BACKEND_ADMIN_KEY }}
          PUBLIC_HOST: ${{ secrets.BACKEND_PUBLIC_HOST || secrets.EC2_HOST }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          FRONTEND_API_URL: ${{ secrets.FRONTEND_API_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: REPO_URL,DEPLOY_REF,APP_DIR,APP_NAME,BACKEND_PORT,BACKEND_FRONTEND_URL,BACKEND_ADMIN_KEY,PUBLIC_HOST,FRONTEND_PORT,FRONTEND_API_URL
          script: |
            set -euo pipefail
            APP_DIR="${APP_DIR:-/opt/shopsmart}"

            if ! command -v git >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y git
              elif command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y git
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y git
              else
                echo "git is required and no supported package manager was found."
                exit 1
              fi
            fi

            if [ ! -d "${APP_DIR}" ]; then
              mkdir -p "${APP_DIR}"
            fi

            if [ ! -d "${APP_DIR}/.git" ]; then
              git clone "${REPO_URL}" "${APP_DIR}"
            fi

            cd "${APP_DIR}"
            git fetch --all --prune
            git checkout "${DEPLOY_REF}"
            git pull --ff-only origin "${DEPLOY_REF}"
            bash scripts/ec2/bootstrap.sh
            bash scripts/ec2/deploy-app.sh
