name: Deploy Backend To EC2 (ECR + PM2)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "${ECR_REPOSITORY}" >/dev/null

      - name: Build image metadata
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          LATEST_IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "latest_image_uri=${LATEST_IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Build and tag backend image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t "${{ steps.meta.outputs.image_uri }}" \
            -t "${{ steps.meta.outputs.latest_image_uri }}" \
            .

      - name: Push backend image tags
        run: |
          docker push "${{ steps.meta.outputs.image_uri }}"
          docker push "${{ steps.meta.outputs.latest_image_uri }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy backend container on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
          CONTAINER_NAME: ${{ secrets.EC2_CONTAINER_NAME }}
          BACKEND_FRONTEND_URL: ${{ secrets.BACKEND_FRONTEND_URL }}
          BACKEND_ADMIN_KEY: ${{ secrets.BACKEND_ADMIN_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: IMAGE_URI,AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,APP_DIR,CONTAINER_NAME,BACKEND_FRONTEND_URL,BACKEND_ADMIN_KEY
          script: |
            set -euo pipefail

            APP_DIR="${APP_DIR:-/opt/shopsmart}"
            CONTAINER_NAME="${CONTAINER_NAME:-shopsmart-backend}"
            BACKEND_FRONTEND_URL="${BACKEND_FRONTEND_URL:-http://localhost:5173}"

            if [ -z "${BACKEND_ADMIN_KEY:-}" ]; then
              echo "BACKEND_ADMIN_KEY is required."
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is not installed. Run scripts/ec2/bootstrap.sh on this EC2 instance."
              exit 1
            fi

            if ! command -v aws >/dev/null 2>&1; then
              echo "aws cli is not installed. Run scripts/ec2/bootstrap.sh on this EC2 instance."
              exit 1
            fi

            mkdir -p "${APP_DIR}/data"
            mkdir -p "${APP_DIR}"

            ECR_REGISTRY="$(echo "${IMAGE_URI}" | cut -d/ -f1)"
            aws ecr get-login-password --region "${AWS_REGION}" | \
              docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            cat > "${APP_DIR}/backend.env" <<EOF
            NODE_ENV=production
            BACKEND_PORT=5001
            FRONTEND_URL=${BACKEND_FRONTEND_URL}
            ADMIN_KEY=${BACKEND_ADMIN_KEY}
            DATABASE_URL=file:/data/dev.db
            EOF

            docker pull "${IMAGE_URI}"
            docker rm -f "${CONTAINER_NAME}" || true
            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              -p 5001:5001 \
              --env-file "${APP_DIR}/backend.env" \
              -v "${APP_DIR}/data:/data" \
              "${IMAGE_URI}"

            if command -v curl >/dev/null 2>&1; then
              for _ in $(seq 1 20); do
                if curl -fsS "http://127.0.0.1:5001/api/health" >/dev/null 2>&1; then
                  echo "Backend health check passed."
                  exit 0
                fi
                sleep 2
              done
              echo "Backend health check failed."
              docker logs "${CONTAINER_NAME}" --tail 100 || true
              exit 1
            fi
